services:

  # ── MinIO (local S3 backend) ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console → http://localhost:9001
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Create the example bucket and seed a test object on first start.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/example-bucket &&
        echo 'Hello from s3sentinel!' | mc pipe local/example-bucket/hello.txt &&
        echo 'Bucket ready.'
      "

  # ── Keycloak (OIDC identity provider) ─────────────────────────────────────
  # The realm, client, groups (reader / admin), and two test users are imported
  # automatically from keycloak/realm.json on first start.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    command: ["start-dev", "--import-realm", "--verbose", "--log-level=INFO" ]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"  # http://localhost:8080
    volumes:
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", 'exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e "GET /realms/s3sentinel/.well-known/openid-configuration HTTP/1.0\r\nhost: 127.0.0.1:8080\r\n\r\n" >&3 && grep -q "jwks_uri" <&3']
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── OPA (policy engine) ───────────────────────────────────────────────────
  # The -debug image variant adds busybox (wget, sh) to the otherwise
  # empty scratch image, which is required for the health check.
  opa:
    image: openpolicyagent/opa:1.10.1-debug
    command: ["run", "--server", "--addr", "0.0.0.0:8181", "--log-format", "text", "--log-level", "debug", "/policies"]
    volumes:
      - ./policy:/policies
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8181/health"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── s3sentinel (proxy + STS) ───────────────────────────────────────────────
  # Build context points at the project root (two levels up from this file).
  s3sentinel:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      # S3 backend — MinIO running in this compose stack
      BACKEND_ENDPOINT: http://minio:9000
      BACKEND_REGION: us-east-1
      BACKEND_ACCESS_KEY: minioadmin
      BACKEND_SECRET_KEY: minioadmin

      # OPA
      OPA_ENDPOINT: http://opa:8181/v1/data/s3/allow

      # OIDC — Keycloak running in this compose stack.
      # JWT_ISSUER is intentionally left unset: tokens are fetched from
      # http://localhost:8180, but s3sentinel reaches Keycloak via the
      # internal hostname keycloak:8080, so the iss claim won't match.
      # Set JWT_ISSUER in production once both sides share the same URL.
      JWKS_ENDPOINT: http://keycloak:8080/realms/s3sentinel/protocol/openid-connect/certs

      # STS credential vending.
      # Generate a real key with: make gen-sts-secret
      STS_TOKEN_SECRET: dev-only-change-this-secret-in-production
      STS_LISTEN_ADDR: ":8090"
      STS_TOKEN_TTL: 1h
    ports:
      - "8080:8080"  # S3 proxy
      - "8090:8090"  # STS endpoint
      - "9090:9090"  # Admin: /healthz /readyz /metrics
    depends_on:
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      opa:
        condition: service_healthy
